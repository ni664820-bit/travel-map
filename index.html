<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Интерактивная карта путешествий</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <header>
    <h1>Интерактивная карта путешествий</h1>
    <p>Нажмите на любую страну, чтобы увидеть информацию и местное время</p>
  </header>

  <div id="loading">
    <div class="spinner"></div>
    <p>Загрузка карты...</p>
  </div>

  <div id="error">
    <p>Не удалось загрузить карту. Проверьте подключение к интернету и обновите страницу.</p>
  </div>

  <div id="map-container"></div>

  <div id="overlay"></div>

  <div id="modal">
    <button id="closeModal">&times;</button>
    <div class="flag-container">
      <img id="flag" src="" alt="" />
    </div>
    <h2 id="countryName"></h2>
    <div class="info-grid">
      <div class="info-row">
        <span class="info-label">Столица</span>
        <span class="info-value" id="capital"></span>
      </div>
      <div class="info-row">
        <span class="info-label">Население</span>
        <span class="info-value" id="population"></span>
      </div>
      <div class="info-row">
        <span class="info-label">Валюта</span>
        <span class="info-value" id="currency"></span>
      </div>
    </div>
    <div class="clock-section">
      <span class="info-label">Местное время</span>
      <div id="clock">--:--:--</div>
      <div id="date"></div>
      <div id="timezone"></div>
    </div>
  </div>

  <script type="module" src="js/app.js"></script>
</body>
</html>
